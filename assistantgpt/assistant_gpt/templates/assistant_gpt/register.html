{% extends "assistant_gpt/home.html" %}

{% block 'title' %}Register - AssistantGPT{% endblock 'title' %}
{% block 'sidebar' %}{% endblock 'sidebar' %}


{% block 'mainarea' %}

<br>

<div class="h-screen flex items-center justify-center bg-[#212121]">

    <div class="w-full max-w-md px-6">

        <!-- CARD -->
        <div class="bg-[#171717] border border-[#2d2d2d]
                    rounded-2xl p-8 shadow-lg">

            <!-- TITLE -->
            <h1 class="text-2xl font-bold text-center mb-2">
                Welcome back
            </h1>

            <p class="text-center text-gray-400 text-sm mb-6">
                Login to continue
            </p>

            <!-- FORM -->
            <form method="POST" class="space-y-4">

                {% csrf_token %}

                <!-- USERNAME -->
                <div>
                    <label class="text-sm text-gray-300">
                        Email
                    </label>

                    <input type="email"
                           name="email"
                           required
                           class="w-full mt-1 p-3 rounded-xl
                                  bg-[#2a2a2a] text-white
                                  outline-none focus:ring-2
                                  focus:ring-green-500">
                </div>

                <!-- PASSWORD -->
                <div>
                    <label class="text-sm text-gray-300">
                        Password
                    </label>

                    <input type="password"
                           name="password"
                           required
                           class="w-full mt-1 p-3 rounded-xl
                                  bg-[#2a2a2a] text-white
                                  outline-none focus:ring-2
                                  focus:ring-green-500">
                </div>

                 <!--  CONFIRM PASSWORD -->
                <div>
                    <label class="text-sm text-gray-300">
                        Confirm Password
                    </label>

                    <input type="conf_password"
                           name="conf_password"
                           required
                           class="w-full mt-1 p-3 rounded-xl
                                  bg-[#2a2a2a] text-white
                                  outline-none focus:ring-2
                                  focus:ring-green-500">
                </div>

                <!-- BUTTON -->
                <button type="submit"
                        class="w-full bg-white text-black
                               py-3 rounded-xl font-semibold
                               hover:bg-gray-200 transition">
                    Login
                </button>

            </form>

            <!-- LINKS -->
            <div class="mt-6 text-center text-sm text-gray-400">

                <p>
                    Don’t have an account?
                    <a href="#"
                       class="text-green-400 hover:underline">
                        Login
                    </a>
                </p>

            </div>

        </div>

    </div>

</div>
<br>
{% endblock 'mainarea' %}
