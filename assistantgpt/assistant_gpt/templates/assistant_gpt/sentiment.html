<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AssistantGPT(Beta)</title>

<style>
:root {
  --bg: #080808;
  --panel: #080808;
  --user: #2a2a2a;
  --bot: #1f1f1f;
  --border: #2d2d2d;
  --text: #e5e5e5;
  --accent: #10a37f;
}

* { box-sizing: border-box; font-family: system-ui, -apple-system; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.chat {
  width: 100%;
  max-width: 480px;
  height: 100vh;
  background: var(--panel);
  display: flex;
  flex-direction: column;
}

.header { padding: 14px; text-align: center; font-weight: 600; border-bottom: 1px solid var(--border); }

.messages { flex: 1; padding: 16px; overflow-y: auto; }

/* --- Message Bubbles --- */
.msg {
  max-width: 85%;
  padding: 12px 20px;
  border-radius: 25px; /* Keeps the pill shape for messages */
  margin-bottom: 12px;
  font-size: 15px;
  line-height: 1.5;
  word-wrap: break-word;
}

.user {
  background: #2f2f2f;
  margin-left: auto;
}

.bot {
  background: #1f1f1f;
  margin-right: auto;
}

/* --- Input Area (Updated to match image) --- */
.input-area {
  display: flex;
  align-items: center; /* Centers the button and input vertically */
  background: #212121; /* Matches the dark gray pill color */
  border-radius: 30px; /* Overall pill shape for the container */
  padding: 6px 6px 6px 20px; /* Space for text on left, tight on right for button */
  margin: 10px;
}

#input {
  flex: 1;
  resize: none;
  border: none;      /* Removed border from the inner field */
  outline: none;
  background: transparent; /* Makes the inner field invisible */
  color: #ffffff;
  font-size: 16px;
  padding: 10px 0;
}

/* --- THE SEND BUTTON (The Skin) --- */
.sendbtn {
  width: 32px;
  height: 32px;
  background: #ffffff; /* White circle from image */
  border-radius: 50%;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  margin-left: 10px;
  transition: transform 0.1s ease;
}

.sendbtn:active {
  transform: scale(0.95); /* Slight click effect */
}

/* Arrow Icon inside the button */
.sendbtn svg {
  fill: #000000;
  width: 18px;
  height: 18px;
}


button:disabled { cursor: not-allowed; }

/* Mobile */
@media (max-width: 600px) { .chat { max-width: 100%; } }
</style>
</head>

<body>

<div class="chat">
  <div class="header">AssistantGPT</div>

  <div class="messages" id="messages">
    <div class="msg bot">
      Hi 👋 ask anything , I’ll assist you.
    </div>
  </div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Type your message..."></textarea>
    <button class="sendbtn" id="sendBtn" disabled>
    <svg viewBox="0 0 24 24">
      <path d="M12 4l-8 8h5v8h6v-8h5z"/>
    </svg>
  </button>
  </div>
</div>

<script>
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const messages = document.getElementById("messages");

let isLoading = false;

// Centralized button state function
function updateButtonState() {
  sendBtn.disabled = isLoading || input.value.trim() === "";
  sendBtn.style.opacity = sendBtn.disabled ? "0.5" : "1";
}

// Input listener
input.addEventListener("input", updateButtonState);

// Send function
sendBtn.addEventListener("click", send);

function send() {
  const text = input.value.trim();
  if (!text || isLoading) return;

  // Set loading state
  isLoading = true;
  updateButtonState();

  // User bubble
  const userMsg = document.createElement("div");
  userMsg.className = "msg user";
  userMsg.innerText = text;
  messages.appendChild(userMsg);

  // Bot loader bubble
  const botMsg = document.createElement("div");
  botMsg.className = "msg bot";
  botMsg.innerText = "Preparing response...";
  messages.appendChild(botMsg);

  messages.scrollTop = messages.scrollHeight;

  // Clear input but keep button disabled until response
  input.value = "";
  updateButtonState();

  // 🔗 Call Django
  fetch("/assistantgpt/chat/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": "{{ csrf_token }}"
    },
    body: JSON.stringify({ text })
  })
  .then(res => res.json())
  .then(data => {
    // Replace loader with actual response
    botMsg.innerText = `${data.label}`;
    isLoading = false;
    updateButtonState();
  })
  .catch(err => {
    botMsg.innerText = "Error analyzing sentiment. Try again.";
    isLoading = false;
    updateButtonState();
  });
}
</script>

</body>
</html>
